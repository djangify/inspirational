{% extends "base.html" %} 

{% block content %}
<div class="max-w-2xl mx-auto my-12 px-4">
    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <div class="bg-green-50 border-b border-green-100 px-6 py-4">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <svg class="h-12 w-12 text-green-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div class="ml-4">
                    <h1 class="text-2xl font-bold text-teal-700">Email Successfully Verified</h1>
                    <p class="text-teal-700">Your account is now active!</p>
                </div>
            </div>
        </div>
        
        <div class="px-6 py-8">
            <p class="mb-4">Thank you for verifying your email address. Your account is ready. Log in to access your dashboard, tools, and saved progress.</p>
            
            <div class="mt-8 flex flex-col sm:flex-row sm:justify-center gap-4">
                <a href="{% url 'accounts:login' %}" class="bg-teal-700 hover:bg-teal-800 text-white font-medium py-2 px-6 rounded-md text-center transition-colors">
                    Log in to your account
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
