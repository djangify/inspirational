{% extends "shop/detail.html" %}
{# Editorial theme: inject warm serif palette via CSS vars, keep all existing layout and functionality. #}

{% block extra_head %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap">
<style>
  :root {
    --color-accent:    #0f766e;
    --color-font-main: #1e293b;
    --color-surface:   #f1f5f9;
    --color-bg:        #ffffff;
  }
  body { background-color: var(--color-bg); color: var(--color-font-main); }
  h1, h2, h3, h4 { font-family: 'Playfair Display', Georgia, serif; }
  /* Teal → editorial accent on key interactive elements */
  .bg-teal-700, .hover\:bg-teal-800:hover { background-color: var(--color-accent) !important; }
  .text-teal-700 { color: var(--color-accent) !important; }
  .border-teal-700 { border-color: var(--color-accent) !important; }
</style>
{% endblock %}
