{% comment %}news/templates/news/components/article_schema.html
Article (BlogPosting) + BreadcrumbList JSON-LD.
datePublished stays fixed to publish_date; dateModified uses the manual
content_updated field (set only on meaningful content changes).
{% endcomment %}
{% load static %}

<!-- JSON-LD Schema for News Post -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ post.title|escapejs }}",
  "description": "{{ post.meta_description|default:post.content|striptags|truncatechars:160|escapejs }}",
  "image": "{% if post.get_image_url %}{{ request.scheme }}://{{ request.get_host }}{{ post.get_image_url }}{% elif post.get_youtube_thumbnail %}{{ post.get_youtube_thumbnail }}{% else %}{{ request.scheme }}://{{ request.get_host }}{% static 'images/ig-header-logo.jpg' %}{% endif %}",
  "author": {
    "@type": "Person",
    "name": "{{ author_name|escapejs }}",
    "description": "{{ author_short_bio|escapejs }}",
    "url": "{{ request.scheme }}://{{ request.get_host }}{{ author_url }}",
    "image": "{{ request.scheme }}://{{ request.get_host }}{% static author_photo %}",
    "knowsAbout": [
      "Getting Out of a Rut",
      "Everyday Novelty & Intentional Choices",
      "Rediscovering Enjoyment",
      "The ALIVE List Method",
      "Journaling for Personal Growth",
      "Life Coaching"
    ],
    "sameAs": [
      "{{ social_youtube }}",
      "{{ social_pinterest }}",
      "{{ social_substack }}",
      "{{ social_substack_profile }}"
    ]
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ site_name|escapejs }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ request.scheme }}://{{ request.get_host }}{% static 'images/ig-header-logo.jpg' %}"
    }
  },
  "datePublished": "{% if post.publish_date %}{{ post.publish_date|date:'c' }}{% else %}{{ post.created|date:'c' }}{% endif %}",
  "dateModified": "{% if post.content_updated %}{{ post.content_updated|date:'c' }}{% elif post.publish_date %}{{ post.publish_date|date:'c' }}{% else %}{{ post.created|date:'c' }}{% endif %}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ request.build_absolute_uri }}"
  }
  {% if post.category %}
  ,"articleSection": "{{ post.category.name|escapejs }}"
  {% endif %}
  {% if post.meta_keywords %}
  ,"keywords": "{{ post.meta_keywords|escapejs }}"
  {% endif %}
}
</script>

<!-- BreadcrumbList Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {"@type": "ListItem", "position": 1, "name": "Home",
     "item": "{{ request.scheme }}://{{ request.get_host }}/"},
    {"@type": "ListItem", "position": 2, "name": "Blog",
     "item": "{{ request.scheme }}://{{ request.get_host }}{% url 'news:list' %}"}
    {% if post.category %}
    ,{"@type": "ListItem", "position": 3, "name": "{{ post.category.name|escapejs }}",
     "item": "{{ request.scheme }}://{{ request.get_host }}{{ post.category.get_absolute_url }}"}
    ,{"@type": "ListItem", "position": 4, "name": "{{ post.title|escapejs }}"}
    {% else %}
    ,{"@type": "ListItem", "position": 3, "name": "{{ post.title|escapejs }}"}
    {% endif %}
  ]
}
</script>
